<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forró Passos Condutor</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Forró Passos Condutor</h1>

      <nav class="tabs">
        <button class="tab active" data-tab="register">Cadastro</button>
        <button class="tab" data-tab="randomize">Randomização</button>
      </nav>

      <section id="register" class="tab-content active">
        <h2>Cadastrar passo</h2>
        <form id="step-form" class="card">
          <label>
            Nome do passo
            <input id="step-name" type="text" required />
          </label>

          <label class="checkbox-label">
            <input id="starts-left" type="checkbox" />
            Começa com a perna esquerda livre
          </label>

          <button type="submit">Salvar passo</button>
        </form>

        <h3>Passos cadastrados</h3>
        <ul id="steps-list" class="card list"></ul>
      </section>

      <section id="randomize" class="tab-content">
        <h2>Randomização</h2>
        <div class="columns">
          <div class="card">
            <h3>Esquerda livre</h3>
            <ul id="left-list" class="list"></ul>
          </div>
          <div class="card">
            <h3>Direita livre</h3>
            <ul id="right-list" class="list"></ul>
          </div>
        </div>

        <button id="generate-btn">Gerar sequências</button>

        <div class="card">
          <h3>Sequências geradas</h3>
          <ul id="pairs-list" class="list"></ul>
          <h3>Sobras</h3>
          <ul id="leftovers-list" class="list"></ul>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
