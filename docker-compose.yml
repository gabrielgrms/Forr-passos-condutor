services:
  db:
    image: postgres:16
    container_name: forro_db
    environment:
      POSTGRES_DB: forro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: forro_api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/forro
    ports:
      - "8000:8000"

volumes:
  postgres_data:
